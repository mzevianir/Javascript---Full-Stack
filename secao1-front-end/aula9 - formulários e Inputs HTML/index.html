<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <style>
        body {
            font-family: sans-serif;
        }

        label {
            display: block;
            cursor: pointer;
        }
    </style>
</head>

<body>
    <form action="#" method="get" target="_blank" autocomplete="off">
        <p>O meu formulário</p>
        <p>
            <label for="nome">Nome:</label>
            <input type="text" id="nome" name="nome" placeholder="Seu nome">
        </p>

        <p>
            <label for="dev1">Sou um dev1</label>
            <input type="checkbox" id="dev1" name="dev1" value="dev1"><br>
            <label for="dev2">Sou um dev2</label>
            <input type="checkbox" id="dev2" name="dev2" value="dev2"><br>
            <label for="dev3">Sou um dev3</label>
            <input type="checkbox" id="dev3" name="dev3" value="dev3"><br>
        </p>

        <p>
            Gênero:<br>
            <label for="feminino">Feminino</label>
            <input type="checkbox" id="feminino" name="feminino" value="feminino"><br>
            <label for="masculino">Masculino</label>
            <input type="checkbox" id="masculino" name="masculino" value="masculino"><br>
            <label for="outro">Outro</label>
            <input type="checkbox" id="outro" name="outro" value="outro"><br>
        </p>

        <p>
            Orientacao:<br>
            <label for="hetero">Hetero</label>
            <input type="radio" id="hetero" name="orientacao" value="hetero"><br>
            <label for="homo">Homo</label>
            <input type="radio" id="homo" name="orientacao" value="homo"><br>
            <label for="outros">Outros</label>
            <input type="radio" id="outros" name="orientacao" value="outros"><br>
        </p>

        <p>
            <label for="date">Data:</label>
            <input type="date" id="date" name="date" value="date"><br>

            <label for="datetime">Data e Horário:</label>
            <input type="datetime-local" id="datetime" name="datetime" value="datetime"><br>

            <label for="time">Horário:</label>
            <input type="time" id="time" name="time" value="time"><br>
        </p>

        <p>
            <label for="cor">Cor preferida:</label>
            <input type="color" id="cor" name="cor" value="cor"><br>
        </p>

        <p>
            <label for="email">Seu email:</label>
            <input type="email" id="email" name="email" placeholder="seu email"><br>
        </p>

        <p>
            <label for="file">Envie um arquivo:</label>
            <input type="file" id="file" name="file" value="file" accept=".png, .svg, image/*" multiple><br>
        </p>

        <p>
            <label for="number">Informe um numero:</label>
            <input type="number" id="number" name="number" value="number"><br>
        </p>

        <p>
            <label for="password">Informe uma senha:</label>
            <input type="password" id="password" name="password" placeholder="Digite sua senha"><br>
        </p>

        <p>
            <label for="range">Range:</label>
            <input type="range" id="range" name="range" min="0" max="10" step="2"><br>
        </p>

        <p>
            <label for="range1">Range 1:</label>
            <input type="range" id="range1" name="range1" list="tickmarks"><br>

            <datalist id="tickmarks">
                <option value="0" label="0%">
                <option value="10">
                <option value="20">
                <option value="30">
                <option value="40">
                <option value="50" label="50%">
                <option value="60">
                <option value="70">
                <option value="80">
                <option value="90">
                <option value="100" label="100%">
            </datalist>
        </p>

        <p>
            <label for="url">Sua url:</label>
            <input type="url" id="url" name="url" placeholder="URL"><br>
        </p>

        <p>
            <label for="search">Search:</label>
            <input type="search" id="search" name="search" placeholder="Search"><br>
        </p>

        <p>
            <label for="select">Selecione alguma opção:</label>
            <select id="select" name="select">
                <optgroup label="Teste">
                    <option value="qualquer 1" label="Label 1">
                    <option value="qualquer 2" label="Label 2">
                    <option value="qualquer 3" label="Label 3">
                </optgroup>
                <optgroup label="Teste 2">
                    <option value="qualquer 1" label="Label 1">
                    <option value="qualquer 2" label="Label 2">
                    <option value="qualquer 3" label="Label 3">
                </optgroup>
            </select>
        </p>

        <p>
            <label for="textarea">textarea:</label>
            <textarea name="textarea" id="textarea" rows="3" cols="9" placeholder="Informe uma mensagem qualquer"></textarea>
        </p>

        <p>
            <button type="reset">Limpar</button>
            <button type="submit">Enviar</button>
        </p>
    </form>
</body>

</html>
