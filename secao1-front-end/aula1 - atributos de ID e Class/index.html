<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu HTML</title>

    <style>
        h1 {
            background: red;
        }

        p {
            background: blue;
        }

        /* Usa a # para mencionar o ID */
        #cabecalho-dois{
            background: purple;
        }

        /* Usa o . para mencionar a classe 
        E o !important, força o navegador a sobreescrever */
        .fundo-vermelho{
            background: brown !important;
        }

        .bold {
            color: white;
        }


    </style>
</head>
<body>
    <h1 id = "cabecalho-um"class="fundo-vermelho borda-esquerda"> Vai vir aqui </h1>
    <h1 id = "cabecalho-dois"class="fundo-vermelho"> Vai vir aqui </h1>
    <p>
        <b class="bold">Lorem ipsum dolor sit amet consectetur adipisicing elit.</b>
        Placeat at quo cumque error obcaecati dolorum inventore autem facilis officia eius. 
        Adipisci, laborum. Mollitia voluptas fugit odio at illo beatae officiis.
    </p>
</body>
</html>
