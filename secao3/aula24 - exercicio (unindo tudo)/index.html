<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Tabela e Cálculo IMC</title>
  <link rel="stylesheet" href="./assets/css/style.css"/>
</head>
<body>
  <section class="container">

    <!-- Títulos da seção da “tabela” -->
    <h1>Tabela IMC</h1>
    <h2>Classificação IMC</h2>

    <!-- “Tabela” com Grid (sem elementos de table) -->
    <section class="imc-grid" aria-label="Classificação de IMC">
      <p class="grid-head">IMC</p>
      <p class="grid-head">Resultado</p>

      <p>Menos do que 18,5</p>  <p>Abaixo do peso</p>
      <p>Entre 18,5 e 24,9</p> <p>Peso normal</p>
      <p>Entre 25 e 29,9</p>   <p>Sobrepeso</p>
      <p>Entre 30 e 34,9</p>   <p>Obesidade grau 1</p>
      <p>Entre 35 e 39,9</p>   <p>Obesidade grau 2</p>
      <p>Mais do que 40</p>    <p>Obesidade grau 3</p>
    </section>

    <!-- Título do formulário -->
    <h1>Calcule seu IMC</h1>

    <!-- Formulário -->
    <form action="/" id="formulario" method="POST">
      <label for="peso">Peso:</label>
      <input type="text" id="peso" name="peso" placeholder="Ex: 70" required />

      <label for="altura">Altura (m):</label>
      <input type="text" id="altura" name="altura" placeholder="Ex: 1.75" required />

      <button type="submit">Calcular</button>
    </form>

    <!-- Resultado -->
    <div id="resultado"></div>
  </section>

  <script src="./assets/js/script.js"></script>
</body>
</html>
